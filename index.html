<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Strong in You</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    margin:0;
    background:#ffffff;
    color:#111;
}

.container{
    max-width:430px;
    margin:auto;
    padding:20px;
}

.card{
    background:#f5f7fb;
    border-radius:20px;
    padding:20px;
    margin-top:15px;
}

button{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:none;
    font-size:15px;
}

.option{
    background:white;
    border:1px solid #ddd;
}

.startBtn{
    background:#0b5cff;
    color:white;
}

.hidden{
    display:none;
}

.center{
    text-align:center;
}
</style>
</head>

<body>
<div class="container">

<div id="start" class="card center">
<h2>Explore Strong in You</h2>
<p>สำรวจตัวเองว่าคุณมี<br>
<b>ความเก่ง ความแกร่ง ความกล้า</b></p>
<button class="startBtn" onclick="startGame()">เริ่ม</button>
</div>

<div id="quiz" class="hidden card">
<h3 id="question"></h3>
<div id="options"></div>
</div>

<div id="result" class="hidden">

<div class="card center">
<h2>Hero Personality</h2>
<img id="heroImg" width="180">
<h3 id="heroName"></h3>
</div>

<div class="card">
<canvas id="radarChart"></canvas>
</div>

<div class="card">
<h3>Culture DNA</h3>
<p id="dna"></p>
</div>

<div class="card">
<h3>FOCUS Strong Level</h3>
<p id="level"></p>
</div>

<div class="card">
<h3>คำแนะนำพัฒนา</h3>
<p id="advice"></p>
</div>

<div class="card">
<h3>Personality Reading</h3>
<p id="reading"></p>
</div>

</div>
</div>

<script>
let questions = [
{q:"1.1 งานใหม่ยาก", options:[
{text:"E – คิดวิธีใหม่และช่วยทีม",score:5},
{text:"G – เรียนรู้และทำ",score:4},
{text:"S – ทำตามขั้นตอน",score:3},
{text:"L – รอคำแนะนำ",score:2},
{text:"I – หลีกเลี่ยง",score:1}
]},
{q:"1.2 ระบบใหม่", options:[
{text:"E – เชี่ยวชาญและสอนคนอื่น",score:5},
{text:"G – เรียนรู้ใช้งาน",score:4},
{text:"S – ใช้เฉพาะงาน",score:3},
{text:"L – ใช้เมื่อจำเป็น",score:2},
{text:"I – ไม่ใช้",score:1}
]},
{q:"1.3 พัฒนาตัวเอง", options:[
{text:"E – พัฒนาและสร้างองค์ความรู้",score:5},
{text:"G – เรียนรู้อย่างต่อเนื่อง",score:4},
{text:"S – เรียนรู้เมื่อจำเป็น",score:3},
{text:"L – ไม่ค่อยพัฒนา",score:2},
{text:"I – ไม่สนใจ",score:1}
]},
{q:"2.1 งานกดดัน", options:[
{text:"E – เป็นพลังทีม",score:5},
{text:"G – ทำเต็มที่",score:4},
{text:"S – ทำหน้าที่",score:3},
{text:"L – เครียด",score:2},
{text:"I – ถอนตัว",score:1}
]},
{q:"2.2 ลูกค้าต่อว่า", options:[
{text:"E – วิเคราะห์และแก้",score:5},
{text:"G – รับฟังแก้ไข",score:4},
{text:"S – แจ้งหัวหน้า",score:3},
{text:"L – หลีกเลี่ยง",score:2},
{text:"I – โต้เถียง",score:1}
]},
{q:"2.3 ขัดแย้งทีม", options:[
{text:"E – ไกล่เกลี่ย",score:5},
{text:"G – คุยหาทางออก",score:4},
{text:"S – ทำงานตัวเอง",score:3},
{text:"L – เลี่ยง",score:2},
{text:"I – ไม่ร่วมงาน",score:1}
]},
{q:"3.1 Brainstorm", options:[
{text:"E – กระตุ้นทีม",score:5},
{text:"G – เสนอไอเดีย",score:4},
{text:"S – เสนอเมื่อมั่นใจ",score:3},
{text:"L – รอถาม",score:2},
{text:"I – ไม่พูด",score:1}
]},
{q:"3.2 ไอเดียใหม่", options:[
{text:"E – ลงมือทำ",score:5},
{text:"G – เสนอหัวหน้า",score:4},
{text:"S – เก็บไว้",score:3},
{text:"L – รอคนอื่น",score:2},
{text:"I – ไม่เสนอ",score:1}
]},
{q:"3.3 สิ่งควรปรับปรุง", options:[
{text:"E – เสนอและทำ",score:5},
{text:"G – เสนอแนวทาง",score:4},
{text:"S – แจ้ง",score:3},
{text:"L – ไม่ยุ่ง",score:2},
{text:"I – ปล่อย",score:1}
]}
];

let index=0;
let scores=[];

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
let q=questions[index];
document.getElementById("question").innerText=q.q;
let html="";
q.options.forEach(o=>{
html+=`<button class="option" onclick="answer(${o.score})">${o.text}</button>`;
});
document.getElementById("options").innerHTML=html;
}

function answer(score){
scores.push(score);
index++;
if(index<questions.length){
showQuestion();
}else{
showResult();
}
}

function level(score){
if(score>=37) return "Excellence";
if(score>=28) return "Good";
if(score>=19) return "Standard";
if(score>=10) return "Low";
return "Improve";
}

function categoryLevel(score){
if(score>=13) return "E";
if(score>=10) return "G";
if(score>=7) return "S";
if(score>=4) return "L";
return "I";
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let skill = scores[0]+scores[1]+scores[2];
let strong = scores[3]+scores[4]+scores[5];
let brave = scores[6]+scores[7]+scores[8];
let total = skill+strong+brave;

let heroImg="",heroName="";

if(total>=37){
heroImg="images/judy.png";
heroName="Judy Hopps – Excellence";
}else if(total>=28){
heroImg="images/nick.png";
heroName="Nick Wilde – Good";
}else if(total>=19){
heroImg="images/bogo.png";
heroName="Chief Bogo – Standard";
}else if(total>=10){
heroImg="images/flash.png";
heroName="Flash – Low";
}else{
heroImg="images/lion.png";
heroName="Mayor Lionheart – Improve";
}

document.getElementById("heroImg").src=heroImg;
document.getElementById("heroName").innerText=heroName;

document.getElementById("dna").innerText =
"เก่ง: "+skill+"/15 | แกร่ง: "+strong+"/15 | กล้า: "+brave+"/15";

document.getElementById("level").innerText =
total+" คะแนน ("+level(total)+")";

let skillLvl = categoryLevel(skill);
let strongLvl = categoryLevel(strong);
let braveLvl = categoryLevel(brave);

document.getElementById("advice").innerHTML =
"<b>เก่ง ("+skillLvl+"):</b> "+getAdvice("skill",skillLvl)+"<br><br>"+
"<b>แกร่ง ("+strongLvl+"):</b> "+getAdvice("strong",strongLvl)+"<br><br>"+
"<b>กล้า ("+braveLvl+"):</b> "+getAdvice("brave",braveLvl);

document.getElementById("reading").innerHTML =
"<b>ความเก่ง:</b> "+getReading("skill",skillLvl)+"<br><br>"+
"<b>ความแกร่ง:</b> "+getReading("strong",strongLvl)+"<br><br>"+
"<b>ความกล้า:</b> "+getReading("brave",braveLvl);

let ctx=document.getElementById("radarChart");
new Chart(ctx,{
type:'radar',
data:{
labels:['เก่ง','แกร่ง','กล้า'],
datasets:[{
data:[skill,strong,brave]
}]
},
options:{
scales:{
r:{
min:0,
max:15
}
}
}
});
}
</script>

</body>
</html>
