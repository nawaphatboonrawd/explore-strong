<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Strong in You</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    margin:0;
    background:#ffffff;
    color:#111;
}

.container{
    max-width:430px;
    margin:auto;
    padding:20px;
}

.card{
    background:#f5f7fb;
    border-radius:20px;
    padding:20px;
    margin-top:15px;
}

button{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:none;
    font-size:15px;
}

.option{
    background:white;
    border:1px solid #ddd;
}

.startBtn{
    background:#0b5cff;
    color:white;
}

.hidden{
    display:none;
}

.center{
    text-align:center;
}
</style>
</head>

<body>
<div class="container">

<div id="start" class="card center">
<h2>Explore Strong in You</h2>
<p>สำรวจตัวเองว่าคุณมี<br>
<b>ความเก่ง ความแกร่ง ความกล้า</b></p>
<button class="startBtn" onclick="startGame()">เริ่ม</button>
</div>

<div id="quiz" class="hidden card">
<h3 id="question"></h3>
<div id="options"></div>
</div>

<div id="result" class="hidden">

<div class="card center">
<h2>Hero Personality</h2>
<img id="heroImg" width="180">
<h3 id="heroName"></h3>
</div>

<div class="card">
<canvas id="radarChart"></canvas>
</div>

<div class="card">
<h3>Culture DNA</h3>
<p id="dna"></p>
</div>

<div class="card">
<h3>FOCUS Strong Level</h3>
<p id="level"></p>
</div>

<div class="card">
<h3>คำแนะนำพัฒนา</h3>
<p id="advice"></p>
</div>

<div class="card">
<h3>Personality Reading</h3>
<p id="reading"></p>
</div>

</div>
</div>

<script>
let questions = [
{q:"1.1 เมื่อคุณได้รับงานยากที่ไม่เคยทำมาก่อน",
options:[
{text:"คิดวิธีใหม่และช่วยทีมทำ",score:5},
{text:"เรียนรู้และทำจนสำเร็จ",score:4},
{text:"ศึกษาและทำตามขั้นตอน",score:3},
{text:"รอคำแนะนำ",score:2},
{text:"หลีกเลี่ยงงาน",score:1}
]},
{q:"1.2 องค์กรมีระบบใหม่",
options:[
{text:"เรียนรู้จนเชี่ยวชาญและสอนคนอื่น",score:5},
{text:"เรียนรู้และใช้ในงาน",score:4},
{text:"ใช้เฉพาะงานตัวเอง",score:3},
{text:"ใช้เมื่อจำเป็น",score:2},
{text:"ไม่อยากใช้",score:1}
]},
{q:"1.3 การพัฒนาตัวเอง",
options:[
{text:"พัฒนาต่อเนื่องและสร้างองค์ความรู้",score:5},
{text:"เข้าอบรมสม่ำเสมอ",score:4},
{text:"เรียนรู้เมื่อจำเป็น",score:3},
{text:"ไม่ค่อยพัฒนา",score:2},
{text:"ไม่สนใจ",score:1}
]},
{q:"2.1 โปรเจกต์กดดัน",
options:[
{text:"เป็นพลังให้ทีม",score:5},
{text:"ทำงานเต็มที่",score:4},
{text:"ทำงานตัวเองให้เสร็จ",score:3},
{text:"เครียดต้องให้ช่วย",score:2},
{text:"อยากถอนตัว",score:1}
]},
{q:"2.2 ลูกค้าต่อว่า",
options:[
{text:"วิเคราะห์และแก้ปัญหาให้ลูกค้า",score:5},
{text:"รับฟังและแก้ไข",score:4},
{text:"แจ้งหัวหน้า",score:3},
{text:"หลีกเลี่ยงลูกค้า",score:2},
{text:"โต้เถียง",score:1}
]},
{q:"2.3 ขัดแย้งในทีม",
options:[
{text:"ช่วยไกล่เกลี่ย",score:5},
{text:"คุยหาทางออก",score:4},
{text:"ทำงานตัวเอง",score:3},
{text:"หลีกเลี่ยง",score:2},
{text:"ไม่ร่วมงาน",score:1}
]},
{q:"3.1 ระดมสมอง",
options:[
{text:"เสนอไอเดียและกระตุ้นทีม",score:5},
{text:"เสนอความคิดเห็น",score:4},
{text:"เสนอเมื่อมั่นใจ",score:3},
{text:"เสนอเมื่อถูกถาม",score:2},
{text:"ไม่เสนอ",score:1}
]},
{q:"3.2 มีไอเดียใหม่",
options:[
{text:"ทดลองทำจริง",score:5},
{text:"เสนอหัวหน้า",score:4},
{text:"เก็บไว้ก่อน",score:3},
{text:"รอคนอื่นเสนอ",score:2},
{text:"ไม่เสนอ",score:1}
]},
{q:"3.3 เห็นสิ่งที่ควรปรับปรุง",
options:[
{text:"เสนอและลงมือทำ",score:5},
{text:"เสนอแนวทาง",score:4},
{text:"แจ้งผู้เกี่ยวข้อง",score:3},
{text:"ไม่อยากยุ่ง",score:2},
{text:"ปล่อยไป",score:1}
]}
];

let index=0;
let scores=[];

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
let q=questions[index];
document.getElementById("question").innerText=q.q;
let html="";
q.options.forEach(o=>{
html+=`<button class="option" onclick="answer(${o.score})">${o.text}</button>`;
});
document.getElementById("options").innerHTML=html;
}

function answer(score){
scores.push(score);
index++;
if(index<questions.length){
showQuestion();
}else{
showResult();
}
}

function level(score){
if(score>=37) return "Excellence";
if(score>=28) return "Good";
if(score>=19) return "Standard";
if(score>=10) return "Low";
return "Improve";
}

function categoryLevel(score){
if(score>=13) return "E";
if(score>=10) return "G";
if(score>=7) return "S";
if(score>=4) return "L";
return "I";
}

function getAdvice(type, lvl){
const adv = {
skill:{
E:"รักษามาตรฐาน Excellence และถ่ายทอดความรู้ให้ทีม",
G:"เพิ่มความลึกของความเชี่ยวชาญ",
S:"พัฒนาทักษะใหม่อย่างต่อเนื่อง",
L:"เริ่มพัฒนาตัวเองแบบค่อยเป็นค่อยไป",
I:"เร่งพัฒนาทักษะและเปิดใจเรียนรู้"
},
strong:{
E:"ใช้พลังนี้เป็นผู้นำทีม",
G:"ฝึกความเป็นผู้นำมากขึ้น",
S:"ฝึกการตัดสินใจภายใต้ความกดดัน",
L:"พัฒนาการจัดการอารมณ์",
I:"ฝึก Resilience อย่างจริงจัง"
},
brave:{
E:"เป็น Role Model ของความกล้า",
G:"กล้าลงมือทำมากขึ้น",
S:"เสนอไอเดียมากขึ้น",
L:"ฝึกความมั่นใจ",
I:"ฝึกกล้าแสดงออก"
}
};
return adv[type][lvl];
}

function getReading(type, lvl){
const readings = {
skill:{
E:"คุณเป็นคนเก่งระดับสูงและเป็นผู้นำได้",
G:"คุณมีศักยภาพสูงและพัฒนาได้อีก",
S:"คุณมีความสามารถที่มั่นคง",
L:"คุณควรพัฒนาตัวเองเพิ่มเติม",
I:"คุณต้องเร่งพัฒนาอย่างจริงจัง"
},
strong:{
E:"คุณแกร่งมากและเป็นที่พึ่งของทีม",
G:"คุณรับมือกับความกดดันได้ดี",
S:"คุณรับมือสถานการณ์ทั่วไปได้",
L:"คุณยังต้องพัฒนาความมั่นคง",
I:"คุณควรฝึกการเผชิญปัญหา"
},
brave:{
E:"คุณกล้าและเป็นแรงบันดาลใจ",
G:"คุณกล้าแสดงออกได้ดี",
S:"คุณกล้าในระดับหนึ่ง",
L:"คุณควรเพิ่มความมั่นใจ",
I:"คุณควรฝึกความกล้า"
}
};
return readings[type][lvl];
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let skill = scores[0]+scores[1]+scores[2];
let strong = scores[3]+scores[4]+scores[5];
let brave = scores[6]+scores[7]+scores[8];
let total = skill+strong+brave;

let heroImg="";
let heroName="";

if(total>=37){
heroImg="images/judy.png";
heroName="Judy Hopps – Excellence";
}else if(total>=28){
heroImg="images/nick.png";
heroName="Nick Wilde – Good";
}else if(total>=19){
heroImg="images/bogo.png";
heroName="Chief Bogo – Standard";
}else if(total>=10){
heroImg="images/flash.png";
heroName="Flash – Low";
}else{
heroImg="images/lion.png";
heroName="Mayor Lionheart – Improve";
}

document.getElementById("heroImg").src=heroImg;
document.getElementById("heroName").innerText=heroName;

document.getElementById("dna").innerText =
"เก่ง: "+skill+"/15 | แกร่ง: "+strong+"/15 | กล้า: "+brave+"/15";

document.getElementById("level").innerText =
total+" คะแนน ("+level(total)+")";

let skillLvl = categoryLevel(skill);
let strongLvl = categoryLevel(strong);
let braveLvl = categoryLevel(brave);

document.getElementById("advice").innerHTML =
"<b>เก่ง ("+skillLvl+"):</b> "+getAdvice("skill",skillLvl)+"<br>"+
"<b>แกร่ง ("+strongLvl+"):</b> "+getAdvice("strong",strongLvl)+"<br>"+
"<b>กล้า ("+braveLvl+"):</b> "+getAdvice("brave",braveLvl);

document.getElementById("reading").innerHTML =
"<b>ความเก่ง:</b> "+getReading("skill",skillLvl)+"<br>"+
"<b>ความแกร่ง:</b> "+getReading("strong",strongLvl)+"<br>"+
"<b>ความกล้า:</b> "+getReading("brave",braveLvl);

new Chart(document.getElementById("radarChart"),{
type:'radar',
data:{
labels:['เก่ง','แกร่ง','กล้า'],
datasets:[{
data:[skill,strong,brave]
}]
},
options:{
scales:{r:{min:0,max:15}}
}
});
}
</script>

</body>
</html>
